<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>供享村社 · 电脑演示版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 18% -10%, rgba(34,197,94,.18), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(21,128,61,.16), transparent 55%),
      linear-gradient(135deg, #0f1f17 0%, #15241c 50%, #0d1813 100%);
    color: #e7efe9;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; align-items: center; justify-content: center;
    gap: 56px; flex-wrap: wrap; padding: 40px 32px;
  }

  /* ── 手机外壳 ───────────────────────────── */
  .device { position: relative; flex-shrink: 0; }
  .phone {
    position: relative;
    width: 390px; height: 844px; max-height: 92vh;
    background: linear-gradient(145deg, #2a2a2e, #0c0c0e);
    border-radius: 52px; padding: 14px;
    box-shadow:
      0 40px 90px rgba(0,0,0,.55),
      0 0 0 2px rgba(255,255,255,.04) inset,
      0 0 0 9px #1b1b1f;
  }
  .phone .notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 158px; height: 30px; background: #0c0c0e;
    border-radius: 0 0 22px 22px; z-index: 3;
  }
  .phone .speaker {
    position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
    width: 52px; height: 5px; background: #2c2c30; border-radius: 4px; z-index: 4;
  }
  .phone iframe {
    width: 100%; height: 100%; border: none;
    border-radius: 40px; background: #fff; display: block;
  }
  /* 侧边按钮 */
  .phone .btn-r { position: absolute; right: -3px; top: 200px; width: 3px; height: 92px; background: #2a2a2e; border-radius: 3px; }
  .phone .btn-l1 { position: absolute; left: -3px; top: 168px; width: 3px; height: 48px; background: #2a2a2e; border-radius: 3px; }
  .phone .btn-l2 { position: absolute; left: -3px; top: 230px; width: 3px; height: 48px; background: #2a2a2e; border-radius: 3px; }

  /* ── 右侧品牌讲解 ───────────────────────── */
  .side { max-width: 300px; }
  .side .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .side .brand .mark {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    background: linear-gradient(145deg, #22c55e, #15803d);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #fff;
    box-shadow: 0 6px 18px rgba(34,197,94,.35);
  }
  .side .brand .t { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
  .side .brand .s { font-size: 12px; color: #8fb89e; margin-top: 3px; }

  .side .tagline { font-size: 13px; color: #a9c7b5; line-height: 1.9; margin-bottom: 22px; }

  .side .steps { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .side .steps li { display: flex; align-items: flex-start; gap: 12px; font-size: 14px; color: #d7e6dc; line-height: 1.5; }
  .side .steps .n {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
    background: rgba(34,197,94,.15); color: #4ade80;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; border: 1px solid rgba(34,197,94,.3);
  }

  .side .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
  .side .chip {
    font-size: 12px; color: #bfe0cb; padding: 6px 12px; border-radius: 20px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
  }

  .side .hint {
    margin-top: 22px; font-size: 12px; color: #7fa690; line-height: 1.7;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px; padding: 13px 15px;
  }

  /* ── 窄屏（手机访问）：退化为全屏裸 H5，去掉外壳 ─── */
  @media (max-width: 820px) {
    body { gap: 0; padding: 0; background: #fff; }
    .side { display: none; }
    .phone {
      width: 100vw; height: 100vh; max-height: none;
      border-radius: 0; padding: 0; box-shadow: none; background: #fff;
    }
    .phone .notch, .phone .speaker,
    .phone .btn-l1, .phone .btn-l2, .phone .btn-r { display: none; }
    .phone iframe { border-radius: 0; }
  }
</style>
</head>
<body>
  <div class="device">
    <div class="phone">
      <div class="notch"></div>
      <div class="speaker"></div>
      <div class="btn-l1"></div>
      <div class="btn-l2"></div>
      <div class="btn-r"></div>
      <iframe src="index.html" allow="geolocation"></iframe>
    </div>
  </div>

  <div class="side">
    <div class="brand">
      <div class="mark">供</div>
      <div>
        <div class="t">供享村社</div>
        <div class="s">乡村数字经济平台 · 小程序演示</div>
      </div>
    </div>

    <div class="tagline">连接城乡 · 助农惠民。<br>党建引领 + 全周期社会贡献，六大板块体系化呈现。</div>

    <ol class="steps">
      <li><span class="n">1</span><span>点手机里的「微信一键登录」进入首页</span></li>
      <li><span class="n">2</span><span>首页点遍六大板块，体验小店 / 团购 / 政务</span></li>
      <li><span class="n">3</span><span>党建页打开「联建地图」，可拖拽缩放查看 228 个联建党支部</span></li>
    </ol>

    <div class="chips">
      <span class="chip">党建联建地图</span>
      <span class="chip">供享小卖部</span>
      <span class="chip">228 个联建党支部</span>
      <span class="chip">真实产品图</span>
    </div>

    <div class="hint">📱 左侧为手机模拟器视图，即真机内的真实样子。<br>如需真机体验，用手机连同一 WiFi 访问电脑局域网地址即可。</div>
  </div>
</body>
</html>
