name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 把 v3demo 改造成「项目子路径 /gonxiang-village-demo/」可用，
      # 并让手机外壳页(demo.html)成为默认首页。源 v3demo 不变，不影响 Vercel。
      - name: Build site for project subpath
        run: |
          set -e
          rm -rf _site
          cp -R v3demo _site
          mv _site/index.html _site/app.html
          sed -i 's#href="/css/#href="/gonxiang-village-demo/css/#g; s#src="/js/#src="/gonxiang-village-demo/js/#g' _site/app.html
          sed -i 's#__webpack_require__.p="/"#__webpack_require__.p="/gonxiang-village-demo/"#g' _site/js/app.js
          sed -i 's#src="/index.html"#src="app.html"#g; s#src="index.html"#src="app.html"#g' _site/demo.html
          cp _site/demo.html _site/index.html
          # 数智供销 v1.0 演示版挂到 /shuzhi/ 子路径
          mkdir -p _site/shuzhi
          cp -R shuzhi-demo/* _site/shuzhi/
          # v3.1 迭代版挂到 /v3.1/ 子路径（v3 冻结版仍在根路径，两者并存）
          mkdir -p _site/v3.1
          cp -R v3.1demo/. _site/v3.1/
          mv _site/v3.1/index.html _site/v3.1/app.html
          sed -i 's#href="/css/#href="/gonxiang-village-demo/v3.1/css/#g; s#src="/js/#src="/gonxiang-village-demo/v3.1/js/#g' _site/v3.1/app.html
          sed -i 's#__webpack_require__.p="/"#__webpack_require__.p="/gonxiang-village-demo/v3.1/"#g' _site/v3.1/js/app.js
          sed -i 's#src="/index.html"#src="app.html"#g; s#src="index.html"#src="app.html"#g' _site/v3.1/demo.html
          cp _site/v3.1/demo.html _site/v3.1/index.html
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
